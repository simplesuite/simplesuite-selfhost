_format_version: "3.0"

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - Prefer
        - apikey
        - x-client-info
        - x-supabase-api-version
        - content-profile
        - accept-profile
        - x-upsert
        - range
        - if-match
        - if-none-match
      exposed_headers:
        - Content-Range
        - X-Total-Count
        - content-profile
      credentials: false
      max_age: 3600

services:
  - name: rest
    url: http://postgrest:3000
    routes:
      - name: rest-route
        paths:
          - /rest/v1/
        strip_path: true

  - name: auth
    url: http://gotrue:9999
    routes:
      - name: auth-route
        paths:
          - /auth/v1/
        strip_path: true
